spring:
  application:
    name: beauty-scheduler

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/beauty_scheduler}
    username: ${SPRING_DATASOURCE_USERNAME:beauty_user}
    password: ${SPRING_DATASOURCE_PASSWORD:beauty_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:beauty-scheduler-dev-secret-key-at-least-256-bits-long-for-hmac}
  expiration-ms: 86400000

cloudinary:
  url: ${CLOUDINARY_URL:cloudinary://api_key:api_secret@cloud_name}

logging:
  level:
    com.beautyscheduler: INFO
    org.springframework.security: INFO
