name: CI - Beauty Scheduler

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beauty_scheduler_test
          POSTGRES_USER: beauty_user
          POSTGRES_PASSWORD: beauty_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit and integration tests
        run: mvn clean verify -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci-test-secret-key-must-be-at-least-256-bits-long
          CLOUDINARY_URL: cloudinary://test:test@test

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload Cucumber report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: target/cucumber-reports/

      - name: Check test coverage
        run: mvn jacoco:check -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci-test-secret-key-must-be-at-least-256-bits-long
          CLOUDINARY_URL: cloudinary://test:test@test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: beauty-scheduler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
